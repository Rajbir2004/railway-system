{% extends 'head.html' %}
{% load static %}

{% block body %}
<div class="max-w-2xl mx-auto">
    <div class="bg-white rounded-2xl shadow-xl border border-gray-100 overflow-hidden">
        <div class="bg-primary py-6 px-8 flex items-center">
            <div class="bg-white p-3 rounded-full text-primary mr-4 shadow-sm">
                <i class="fa-solid fa-route text-xl"></i>
            </div>
            <h2 class="text-2xl font-bold text-white">Add New Route</h2>
        </div>
        
        <div class="p-8">
            <form method="post" action="" class="space-y-6">
                {% csrf_token %}
                
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Select Train</label>
                    <select name="train1" class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary focus:border-primary outline-none transition-colors" required>
                        <option value="" disabled selected>-- Choose a train --</option>
                        {% for i in train %}
                            <option value="{{ i.trainname }}">{{ i.trainname }} ({{ i.train_no }})</option>
                        {% endfor %}
                    </select>
                </div>
                
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Route / Destination</label>
                    <input type="text" placeholder="Enter destination city" name="route" class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary focus:border-primary outline-none transition-colors" required>
                </div>
                
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Distance (km)</label>
                        <input type="number" placeholder="Distance" name="distance" class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary focus:border-primary outline-none transition-colors" required>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Fare Amount (₹)</label>
                        <input type="number" placeholder="Fare" name="fare" class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary focus:border-primary outline-none transition-colors" required>
                    </div>
                </div>
                
                <div class="pt-4 flex gap-4">
                    <button type="submit" class="flex-1 bg-primary hover:bg-blue-800 text-white font-bold py-3 px-4 rounded-lg shadow transition-colors flex justify-center items-center">
                        <i class="fa-solid fa-plus mr-2"></i> Create Route
                    </button>
                    <a href="{% url 'admindashboard' %}" class="flex-1 bg-gray-100 hover:bg-gray-200 text-gray-800 font-bold py-3 px-4 rounded-lg shadow transition-colors flex justify-center items-center border border-gray-200">
                        <i class="fa-solid fa-xmark mr-2"></i> Cancel
                    </a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
