{% extends 'head.html' %}
{% load static %}

{% block body %}
<div class="max-w-md mx-auto mt-10 bg-white rounded-2xl shadow-xl border border-gray-100 overflow-hidden">
    <div class="bg-primary py-6 px-8">
        <h2 class="text-2xl font-bold text-white text-center">Welcome Back</h2>
        <p class="text-blue-200 text-center text-sm mt-1">Sign in to your account</p>
    </div>
    
    <div class="p-8">
        {% if error %}
        <script>
            alert('Logged in Successfully');
            window.location='{% url "dashboard" %}';
        </script>
        {% endif %}

        {% if error2 %}
        <script>
            alert('Admin Logged in Successfully');
            window.location='{% url "admindashboard" %}';
        </script>
        {% endif %}

        {% if error3 %}
        <div class="mb-4 bg-red-50 border border-red-200 text-red-700 px-4 py-3 rounded-lg text-sm">
            <i class="fa-solid fa-circle-exclamation mr-2"></i> Username or Password is incorrect.
        </div>
        {% endif %}

        <form method="post" action="" class="space-y-5">
            {% csrf_token %}
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Username</label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                        <i class="fa-solid fa-user text-gray-400"></i>
                    </div>
                    <input type="text" required placeholder="Enter username" name="uname" class="pl-10 w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-secondary focus:border-secondary outline-none transition-colors">
                </div>
            </div>
            
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                        <i class="fa-solid fa-lock text-gray-400"></i>
                    </div>
                    <input type="password" required placeholder="Enter password" name="pwd" class="pl-10 w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-secondary focus:border-secondary outline-none transition-colors">
                </div>
            </div>
            
            <div class="pt-2">
                <button type="submit" class="w-full bg-primary hover:bg-blue-800 text-white font-medium py-2.5 px-4 rounded-lg shadow transition-colors">
                    Sign In
                </button>
            </div>
        </form>
        
        <div class="mt-6 text-center text-sm text-gray-500">
            Don't have an account? <a href="{% url 'register_customer' %}" class="text-secondary font-medium hover:underline">Register here</a>
        </div>
    </div>
</div>
{% endblock %}
