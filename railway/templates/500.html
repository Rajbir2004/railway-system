{% extends 'head.html' %}

{% block body %}
<div class="min-h-screen bg-gray-50 flex flex-col justify-center py-12 sm:px-6 lg:px-8">
    <div class="mt-8 sm:mx-auto sm:w-full sm:max-w-md text-center">
        <div class="mx-auto h-24 w-24 bg-red-100 rounded-full flex items-center justify-center mb-6">
            <i class="fa-solid fa-triangle-exclamation text-5xl text-red-500"></i>
        </div>
        <h1 class="text-6xl font-extrabold text-red-600 mb-2">500</h1>

            Our servers are experiencing unexpected delays. The engineering team has been notified and is working to clear the tracks.
        </p>
        <a href="{% url 'nav' %}" class="inline-flex items-center px-6 py-3 border border-transparent text-base font-medium rounded-md shadow-sm text-white bg-red-600 hover:bg-red-700 transition-colors">

    </div>
